<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- 
        const url = "https://api.jsonbin.io/v3/b/69d36e1936566621a882acab";
        const headers = { "$2a$10$VtNksJ6YboQFusiidyv2oe9iN1RPLOw8noKODgM.sirdVZNWUlKiG": "YOUR_KEY", "Content-Type": "application/json" };
 -->
<body onclick="increment()" style="margin:0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#111; color:white; font-family:sans-serif; cursor:pointer; user-select:none;">

    <div style="font-size:20vw; font-weight:bold;" id="num">...</div>
    <div id="status" style="color:#555;">Loading...</div>

    <script>
        const url = "https://api.jsonbin.io/v3/b/69d36e1936566621a882acab";
        const headers = { "$2a$10$VtNksJ6YboQFusiidyv2oe9iN1RPLOw8noKODgM.sirdVZNWUlKiG": "YOUR_KEY", "Content-Type": "application/json" };
        
        let count = 0;
        let timer = null;

        // 1. Initial Load
        fetch(url + "/latest", { headers })
            .then(res => res.json())
            .then(data => {
                count = data.record.pushed || 0;
                document.getElementById('num').innerText = count;
                document.getElementById('status').innerText = "Tap anywhere";
            });

        function increment() {
            // 2. Immediate Visual Feedback
            count++;
            document.getElementById('num').innerText = count;
            document.getElementById('status').innerText = "Waiting to save...";

            // 3. The 3-Second Timer (Debounce)
            clearTimeout(timer); // Reset the clock every time you tap
            timer = setTimeout(saveToDatabase, 3000); 
        }

        async function saveToDatabase() {
            document.getElementById('status').innerText = "Saving...";
            try {
                await fetch(url, { 
                    method: 'PUT', 
                    headers, 
                    body: JSON.stringify({ pushed: count }) 
                });
                document.getElementById('status').innerText = "Saved!";
            } catch (e) {
                document.getElementById('status').innerText = "Error Saving";
            }
        }
    </script>
</body>
</html>
