<!DOCTYPE html>
<html lang="en">
<style>
  body { 
    margin: 0; height: 100vh; 
    background: url('1920x1080.png') no-repeat center/100% auto #000; 
  }
</style>
<body>
<script>
  let taps = [];
  window.onclick = () => {
    const now = Date.now();
    taps.push(now);
    // Keep only taps from the last 5 seconds
    taps = taps.filter(t => now - t < 5000);

    const count = taps.length;
    const isFS = document.fullscreenElement;

    if (count === 3 && !isFS) {
      document.documentElement.requestFullscreen();
      taps = []; // Reset after trigger
    } else if (count === 4 && isFS) {
      document.exitFullscreen();
      taps = []; // Reset after trigger
    }
  };
</script>
</body>
</html>
