<!DOCTYPE html>
<html style="background:#000; height:100%">
<body style="margin:0; height:100%; background:url('1920x1080.png') center/100% auto no-repeat">
<script>
    let y;
    const el = document.documentElement;

    // Mobile Vertical Swipe
    window.ontouchstart = e => y = e.touches[0].clientY;
    window.ontouchend = e => {
        let d = y - e.changedTouches[0].clientY;
        if (d > 50) el.requestFullscreen();     /* Swipe Up (Scroll Down) -> Full */
        if (d < -50) document.exitFullscreen(); /* Swipe Down (Scroll Up) -> Exit */
    };

    // Desktop Mouse Wheel
    window.onwheel = e => {
        if (e.deltaY > 0) el.requestFullscreen(); /* Scroll Down -> Full */
        else document.exitFullscreen();           /* Scroll Up -> Exit */
    };
</script>
</body>
</html>
