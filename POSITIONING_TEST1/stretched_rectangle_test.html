<!DOCTYPE html>
<html style="background:#000; height:100%; overflow:hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stretched Video Overlay</title>
    <style>
        /* This class ensures every image stretches perfectly with the video container */
        .video-overlay {
            position: absolute;
            pointer-events: none; /* Allows clicks to pass through to the video */
            object-fit: fill;    /* Forces the image content to stretch to the % box */
        }
    </style>
</head>
<body style="margin:0; height:100%; display: flex; align-items: center; justify-content: center;">

    <div id="scene" style="position: relative; width: 100%; height: 100%;">
        
        <video id="v" src="1920x1080_3.mp4" autoplay loop muted playsinline 
            style="width:100%; height:100%; object-fit: fill; display: block;">
        </video>

        <img src="rectangle2.png" class="video-overlay" style="
            top: 14.5%;    
            left: 20.8%;   
            width: 9%;  
            height: 15.6%;
        ">

        <img src="rectangle3.png" class="video-overlay" style="
            top: 40.5%;    
            left: 20.8%;   
            width: 9%;  
            height: 15.6%;
        ">

    </div>

    <script>
        let y, v = document.getElementById('v');
        let scene = document.getElementById('scene');

        // Mobile Swipe Controls
        window.ontouchstart = e => y = e.touches[0].clientY;
        window.ontouchend = e => {
            let d = y - e.changedTouches[0].clientY;
            // Swipe Up -> Go Fullscreen (Stretches the 'scene' div)
            if (d > 50) scene.requestFullscreen().catch(err => console.log(err)); 
            
            // Swipe Down -> Exit Fullscreen & Unmute
            if (d < -50) { 
                if(document.fullscreenElement) document.exitFullscreen(); 
                v.muted = false; 
            }
        };

        // Desktop Scroll Controls
        window.onwheel = e => {
            if (e.deltaY > 0) {
                scene.requestFullscreen().catch(err => console.log(err));
            } else { 
                if(document.fullscreenElement) document.exitFullscreen(); 
                v.muted = false; 
            }
        };
    </script>
</body>
</html>
